<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportar Incidente - Help Desk</title>
</head>

<body>

    <!-- ENCABEZADO -->
    <header>
        <h1>Sistema Help Desk</h1>

        <!-- MENÚ DE NAVEGACIÓN -->
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="reportar.html">Reportar Incidente</a></li>
                <li><a href="tickets.html">Tickets</a></li>
            </ul>
        </nav>
    </header>

    <!-- CONTENIDO PRINCIPAL -->
    <main>

        <section>
            <h2>Formulario de Reporte de Incidentes</h2>

            <article>

                <form action="#" method="post">

                    <!-- NOMBRE -->
                    <p>
                        <label for="nombre">Nombre Completo:</label><br>
                        <input 
                            type="text" 
                            id="nombre" 
                            name="nombre"
                            placeholder="Ingrese su nombre"
                            required
                            minlength="3"
                            maxlength="50">
                    </p>

                    <!-- CORREO -->
                    <p>
                        <label for="correo">Correo Electrónico:</label><br>
                        <input 
                            type="email" 
                            id="correo" 
                            name="correo"
                            placeholder="ejemplo@correo.com"
                            required>
                    </p>

                    <!-- PRIORIDAD -->
                    <p>
                        <label for="prioridad">Prioridad del Incidente:</label><br>

                        <select id="prioridad" name="prioridad" required>
                            <option value="">Seleccione una opción</option>
                            <option value="alta">Alta</option>
                            <option value="media">Media</option>
                            <option value="baja">Baja</option>
                        </select>
                    </p>

                    <!-- FECHA -->
                    <p>
                        <label for="fecha">Fecha del Incidente:</label><br>

                        <input 
                            type="date" 
                            id="fecha" 
                            name="fecha"
                            required>
                    </p>

                    <!-- DESCRIPCIÓN -->
                    <p>
                        <label for="descripcion">Descripción del Problema:</label><br>

                        <textarea 
                            id="descripcion" 
                            name="descripcion"
                            rows="6"
                            cols="40"
                            placeholder="Describa el incidente..."
                            required
                            minlength="10"></textarea>
                    </p>

                    <!-- BOTÓN -->
                    <p>
                        <button type="submit">
                            Enviar Reporte
                        </button>

                        <button type="reset">
                            Limpiar Formulario
                        </button>
                    </p>

                </form>

            </article>

        </section>

    </main>

    <!-- PIE DE PÁGINA -->
    <footer>
        <p>
            © 2026 Sistema Help Desk HTML5 - Proyecto Académico
        </p>
    </footer>

</body>

</html>
