```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportar Incidente</title>
</head>

<body>

    <header>
        <h1>Reportar Incidente</h1>

        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="reportar.html">Reportar</a></li>
                <li><a href="tickets.html">Tickets</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <section>

            <h2>Formulario de Reporte</h2>

            <form action="#" method="post">

                <fieldset>

                    <legend>Información del Usuario</legend>

                    <label for="nombre">Nombre Completo:</label>
                    <input 
                        type="text"
                        id="nombre"
                        name="nombre"
                        required
                        minlength="3"
                    >

                    <br><br>

                    <label for="correo">Correo Electrónico:</label>
                    <input
                        type="email"
                        id="correo"
                        name="correo"
                        required
                    >

                    <br><br>

                    <label for="departamento">Departamento:</label>

                    <select id="departamento" name="departamento" required>
                        <option value="">Seleccione</option>
                        <option value="soporte">Soporte</option>
                        <option value="redes">Redes</option>
                        <option value="desarrollo">Desarrollo</option>
                    </select>

                </fieldset>

                <br>

                <fieldset>

                    <legend>Detalle del Incidente</legend>

                    <label for="tipo">Tipo de Problema:</label>

                    <select id="tipo" name="tipo" required>
                        <option value="">Seleccione</option>
                        <option value="hardware">Hardware</option>
                        <option value="software">Software</option>
                        <option value="conexion">Conexión</option>
                    </select>

                    <br><br>

                    <label for="fecha">Fecha del Incidente:</label>

                    <input
                        type="date"
                        id="fecha"
                        name="fecha"
                        required
                    >

                    <br><br>

                    <label for="descripcion">
                        Descripción del Problema:
                    </label>

                    <br>

                    <textarea
                        id="descripcion"
                        name="descripcion"
                        rows="6"
                        cols="40"
                        required
                        minlength="10"
                    ></textarea>

                </fieldset>

                <br>

                <button type="submit">
                    Enviar Reporte
                </button>

            </form>

        </section>

    </main>

    <footer>
        <p>Sistema Help Desk HTML5</p>
    </footer>

</body>
</html>
```
